name: Build - Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
    - run: bun install --frozen-lockfile
    - name: Check whether bun.lock is up to date
      run: |
        bun install
        if ! git diff --quiet -- bun.lock; then
          echo "bun.lock is out of sync with package.json."
          echo "Please run 'bun install' and commit the updated bun.lock."
          exit 1
        else
          echo "bun.lock is up to date."
        fi
    - run: bun run build
    - run: bun run --cwd bin/lib build
    - run: bun run check:cycles

  npm:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
    - run: bun install --frozen-lockfile
    - run: bun run --cwd bin/jam build
    - run: |
        cd dist/jam
        npm install
        node index.js --help

