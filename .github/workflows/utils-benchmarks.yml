# Run all benchmarks and compare the results.

name: Utils - Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  #merge_group: # no need to run benchmarks again

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    runs-on: [self-hosted, benchmarks]

    steps:
      - name: Delete previous comment on PR
        # Don't attempt to comment if PR is coming from a fork.
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: delete
          comment-tag: benchmarks
      - uses: actions/checkout@v6
      - name: Setup Bun
        run: |
          BUN_VERSION="1.3.12"
          INSTALL_DIR="$HOME/.bun/bin"
          mkdir -p "$INSTALL_DIR"
          # Force pinned version: reinstall if missing or version mismatch
          if ! "$INSTALL_DIR/bun" --version 2>/dev/null | grep -qx "$BUN_VERSION"; then
            rm -f /tmp/bun.zip
            rm -rf /tmp/bun-extract
            curl -fsSL -o /tmp/bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v$BUN_VERSION/bun-linux-x64.zip"
            python3 -c "import zipfile; zipfile.ZipFile('/tmp/bun.zip').extractall('/tmp/bun-extract')"
            mv -f /tmp/bun-extract/bun-linux-x64/bun "$INSTALL_DIR/bun"
            chmod +x "$INSTALL_DIR/bun"
          fi
          echo "$INSTALL_DIR" >> $GITHUB_PATH
      - name: Setup Node.js
        # Benchmarks run under node+tsx instead of bun: benny's sample timing
        # is wildly noisy under bun's JIT (±50–175%), blowing past the 30-min
        # CI budget. Node gives ±<7% and finishes in minutes.
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bun install --frozen-lockfile
      - name: Benchmarks run
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: bun run --cwd packages/misc/benchmark start:node
      - name: Display results
        if: always()
        run: cat ./dist/benchmarks/results.txt
      - name: Comment PR
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: ./dist/benchmarks/results.txt
          comment-tag: benchmarks
      - name: Upload new transaction log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          path: |
            ./benchmarks/*/output
            ./dist/benchmarks/results.json
            ./dist/benchmarks/results.txt
          name: benchmark-results
