# Run all benchmarks and compare the results.

name: Utils - Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  #merge_group: # no need to run benchmarks again

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    runs-on: [self-hosted, benchmarks]

    steps:
      - name: Delete previous comment on PR
        # Don't attempt to comment if PR is coming from a fork.
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          mode: delete
          comment-tag: benchmarks
      - uses: actions/checkout@v6
      - name: Setup Bun
        run: |
          if ! command -v bun &>/dev/null; then
            mkdir -p "$HOME/.bun/bin"
            curl -fsSL -o /tmp/bun.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip"
            python3 -c "import zipfile; zipfile.ZipFile('/tmp/bun.zip').extractall('/tmp/bun-extract')"
            mv /tmp/bun-extract/bun-linux-x64/bun "$HOME/.bun/bin/bun"
            chmod +x "$HOME/.bun/bin/bun"
            echo "$HOME/.bun/bin" >> $GITHUB_PATH
          fi
      - run: bun install --frozen-lockfile
      - name: Benchmarks run
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: bun run --cwd packages/misc/benchmark start
      - name: Display results
        if: always()
        run: cat ./dist/benchmarks/results.txt
      - name: Comment PR
        if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: ./dist/benchmarks/results.txt
          comment-tag: benchmarks
      - name: Upload new transaction log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          path: |
            ./benchmarks/*/output
            ./dist/benchmarks/results.json
            ./dist/benchmarks/results.txt
          name: benchmark-results
