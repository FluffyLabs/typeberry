name: E2E - @typeberry/jam

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

jobs:
  jam-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13
    - run: bun install --frozen-lockfile
    - name: Run JAM dev mode E2E test
      run: bun run --cwd bin/jam test:e2e
